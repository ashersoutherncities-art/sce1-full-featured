<!-- SOUTHERN CITIES ENTERPRISES - DESKTOP ENHANCED HEADER -->
<!-- DESKTOP ENHANCEMENT #4: STICKY SHRINKING NAV -->

<style>
    /* Header Styles with Shrinking Sticky Nav */
    .site-header {
        background-color: #132452;
        position: sticky;
        top: 0;
        z-index: 1000;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .site-header.scrolled {
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }

    .header-container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 0 2rem;
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        height: 80px;
        transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .site-header.scrolled .header-container {
        height: 60px;
    }

    /* Logo with Smooth Scaling */
    .header-logo {
        display: flex;
        align-items: center;
        text-decoration: none;
    }

    .header-logo img {
        height: 50px;
        width: auto;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .site-header.scrolled .header-logo img {
        height: 40px;
    }

    .header-logo:hover img {
        transform: scale(1.05);
    }

    /* Desktop Navigation */
    .header-nav {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 2rem;
        justify-self: center;
    }
    
    .nav-cta-wrapper {
        display: flex;
        justify-content: flex-end;
        justify-self: end;
    }

    .nav-menu {
        display: flex;
        list-style: none;
        margin: 0;
        padding: 0;
        gap: 2rem;
        align-items: center;
    }

    .nav-item {
        position: relative;
    }

    .nav-link {
        color: #ffffff;
        text-decoration: none;
        font-size: 15px;
        font-weight: 500;
        letter-spacing: 0.3px;
        transition: color 0.3s ease;
        display: block;
        padding: 0.5rem 0;
    }

    .nav-link:hover {
        color: #fa8c41;
    }

    .nav-link.active {
        color: #fa8c41;
        position: relative;
    }

    .nav-link.active::after {
        content: '';
        position: absolute;
        bottom: -5px;
        left: 0;
        right: 0;
        height: 2px;
        background-color: #fa8c41;
    }

    /* Dropdown */
    .nav-item.has-dropdown {
        position: relative;
    }

    .dropdown-toggle {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        cursor: pointer;
        position: relative;
    }

    .dropdown-toggle::after {
        content: '▾';
        font-size: 12px;
        transition: transform 0.3s ease;
        display: inline-block;
    }

    .nav-item.has-dropdown:hover .dropdown-toggle::after {
        transform: rotate(180deg);
    }
    
    /* Mobile dropdown arrow rotation */
    .nav-item.has-dropdown.mobile-open .dropdown-toggle::after {
        transform: rotate(180deg);
    }

    .dropdown-menu {
        position: absolute;
        top: 100%;
        left: 0;
        margin-top: 0.5rem;
        background-color: #ffffff;
        min-width: 220px;
        border-radius: 8px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        opacity: 0;
        visibility: hidden;
        transform: translateY(-10px);
        transition: all 0.3s ease;
        overflow: hidden;
    }

    .nav-item.has-dropdown:hover .dropdown-menu {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
    }

    .dropdown-menu a {
        display: block;
        padding: 0.875rem 1.25rem;
        color: #132452;
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.3s ease;
        border-left: 3px solid transparent;
    }

    .dropdown-menu a:hover {
        background-color: #f6f6ff;
        color: #fa8c41;
        border-left-color: #fa8c41;
        padding-left: 1.5rem;
    }

    .dropdown-menu a:not(:last-child) {
        border-bottom: 1px solid #f0f0f0;
    }

    /* CTA Button */
    .cta-button {
        background-color: #fa8c41;
        color: #ffffff;
        padding: 0.75rem 1.75rem;
        border-radius: 50px;
        text-decoration: none;
        font-weight: 600;
        font-size: 14px;
        letter-spacing: 0.5px;
        transition: all 0.3s ease;
        border: 2px solid #fa8c41;
        display: inline-block;
    }

    .cta-button:hover {
        background-color: transparent;
        color: #fa8c41;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(250, 140, 65, 0.3);
    }

    /* Mobile Menu Toggle */
    .mobile-toggle {
        display: none;
        flex-direction: column;
        gap: 5px;
        cursor: pointer;
        padding: 0.5rem;
        background: none;
        border: none;
        justify-self: center;
    }

    .mobile-toggle span {
        display: block;
        width: 25px;
        height: 2px;
        background-color: #ffffff;
        transition: all 0.3s ease;
    }

    .mobile-toggle.active span:nth-child(1) {
        transform: rotate(45deg) translateY(8px);
    }

    .mobile-toggle.active span:nth-child(2) {
        opacity: 0;
    }

    .mobile-toggle.active span:nth-child(3) {
        transform: rotate(-45deg) translateY(-8px);
    }

    /* Mobile Menu */
    @media (max-width: 968px) {
        .header-nav {
            position: fixed;
            top: 80px;
            left: 0;
            right: 0;
            background-color: #132452;
            flex-direction: column;
            gap: 0;
            padding: 2rem 0;
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: all 0.4s ease;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        .site-header.scrolled .header-nav {
            top: 60px;
        }

        .header-nav.active {
            max-height: calc(100vh - 80px);
            opacity: 1;
            overflow-y: auto;
        }

        .site-header.scrolled .header-nav.active {
            max-height: calc(100vh - 60px);
        }

        .nav-menu {
            flex-direction: column;
            gap: 0;
            width: 100%;
        }

        .nav-item {
            width: 100%;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-link {
            padding: 1rem 2rem;
            width: 100%;
        }
        
        /* Override desktop dropdown hover behavior on mobile */
        .nav-item.has-dropdown:hover .dropdown-menu {
            max-height: 0;
            opacity: 1;
            visibility: visible;
        }

        .dropdown-menu {
            position: static;
            opacity: 1;
            visibility: visible;
            transform: none;
            box-shadow: none;
            margin-top: 0;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), 
                        background-color 0.3s ease;
            background-color: rgba(255, 255, 255, 0.03);
            border-radius: 0;
        }

        .nav-item.has-dropdown.mobile-open .dropdown-menu {
            max-height: 500px;
            background-color: rgba(255, 255, 255, 0.08);
        }

        .dropdown-menu a {
            color: #ffffff;
            padding: 0.875rem 2.5rem;
            border-left: 3px solid transparent;
            transition: all 0.2s ease;
        }

        .dropdown-menu a:hover,
        .dropdown-menu a:active {
            background-color: rgba(250, 140, 65, 0.25);
            border-left-color: #fa8c41;
            padding-left: 2.75rem;
        }
        
        /* Make dropdown toggle more tappable on mobile */
        .nav-item.has-dropdown .dropdown-toggle {
            width: 100%;
            justify-content: center;
            padding: 1rem 2rem;
            -webkit-tap-highlight-color: rgba(250, 140, 65, 0.2);
        }
        
        /* Visual feedback on tap */
        .nav-item.has-dropdown .dropdown-toggle:active {
            background-color: rgba(250, 140, 65, 0.1);
        }

        .cta-button {
            margin: 1.5rem 2rem 0.5rem;
            display: block;
            text-align: center;
        }

        .mobile-toggle {
            display: flex;
        }
    }

    @media (max-width: 768px) {
        .header-container {
            height: 70px;
        }

        .site-header.scrolled .header-container {
            height: 60px;
        }

        .header-logo img {
            height: 40px;
        }

        .site-header.scrolled .header-logo img {
            height: 35px;
        }
        
        .cta-button {
            padding: 0.625rem 1.25rem;
            font-size: 13px;
        }
    }

    /* Center hamburger on mobile */
    @media (max-width: 968px) {
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 1rem;
            position: relative;
            height: 70px;
        }

        .site-header.scrolled .header-container {
            height: 60px;
        }
        
        .header-logo {
            flex-shrink: 0;
            z-index: 2;
            display: flex;
            align-items: center;
        }
        
        .mobile-toggle {
            display: flex;
            align-items: center;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
        }
        
        .header-nav {
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
        }

        .site-header.scrolled .header-nav {
            top: 60px;
        }
        
        .nav-cta-wrapper {
            flex-shrink: 0;
            z-index: 2;
            margin-right: -0.5rem;
            display: flex;
            align-items: center;
        }
        
        .cta-button {
            padding: 0.625rem 1.25rem;
            font-size: 13px;
        }
    }
</style>
