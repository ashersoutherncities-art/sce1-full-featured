        .search-filter-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 5%;

        }

        .search-bar {
            width: 100%;
            padding: 1rem 1.5rem;
            font-size: 1.1rem;

            font-family: 'Montserrat', sans-serif;
        }

        .category-filters {
            display: flex;
            gap: 1rem;

            margin-bottom: 2rem;
        }

        .filter-btn {
            padding: 0.6rem 1.5rem;
            background: white;
            color: var(--navy);
            border: 2px solid var(--navy);
            border-radius: 50px;

        .glossary-content {

        .alphabet-nav {
            display: flex;
            flex-wrap: wrap;

        }

        .alphabet-link {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--light-bg);
            color: var(--navy);
            font-weight: 600;
            border-radius: 50%;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .alphabet-link:hover {
            background: var(--orange);
            color: white;
        }

        .term-card {
            background: white;
            border: 1px solid #e0e0e0;
            border-left: 4px solid var(--orange);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
        }

        .term-card:hover {
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);

        .term-title {
            font-size: 1.5rem;

        .term-category {

            border-radius: 15px;

        }

        .term-definition {
            color: #333;
            line-height: 1.7;
            margin-bottom: 0.5rem;
        }

        .term-example {
            background: var(--light-bg);
            padding: 0.8rem;
            border-radius: 4px;
            font-style: italic;

        }

        .no-results {
            text-align: center;

        .back-to-hub {
            text-align: center;

        }

        .back-to-hub a {
            color: var(--orange);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
        }

        @media (max-width: 768px) {
            .glossary-header h1 {
                font-size: 2rem;
            }

            .alphabet-nav {
                gap: 0.3rem;
            }

            .alphabet-link {
                width: 30px;
                height: 30px;
                font-size: 0.9rem;
            }

    </style>

    <script src="../load-header.js"></script>

    <script>
        // Comprehensive glossary data
        const glossaryTerms = [
            { term: 'ARV (After Repair Value)', category: 'valuation', definition: 'The estimated value of a property after all repairs and renovations are completed. Critical for fix-and-flip and BRRRR strategies.', example: 'You buy a house for $80K, spend $30K on repairs, and the ARV is $150K.' },
            { term: 'Cap Rate (Capitalization Rate)', category: 'metrics', definition: 'A metric that measures the rate of return on a real estate investment based on the income the property generates. Calculated as Net Operating Income ÷ Property Value.', example: 'A property worth $200K generating $16K NOI has an 8% cap rate.' },
            { term: 'Cash-on-Cash Return', category: 'metrics', definition: 'The annual pre-tax cash flow divided by the total cash invested. Measures your actual return on dollars out of pocket.', example: 'You invest $50K (down payment + repairs) and get $4K annual cash flow = 8% CoC return.' },
            { term: 'BRRRR', category: 'financing', definition: 'Buy, Rehab, Rent, Refinance, Repeat. A strategy to acquire rental properties using little to no money left in the deal.', example: 'Buy distressed property, renovate, rent it out, refinance at higher value, pull cash out, repeat.' },
            { term: 'NOI (Net Operating Income)', category: 'metrics', definition: 'Total rental income minus operating expenses (excluding mortgage payments). Used to calculate cap rate and property value.', example: 'Rent: $24K/year, Expenses: $8K = NOI of $16K.' },
            { term: '1% Rule', category: 'metrics', definition: 'A quick screening tool: monthly rent should equal at least 1% of the purchase price for positive cash flow.', example: 'A $100K property should rent for at least $1,000/month.' },
            { term: '70% Rule', category: 'metrics', definition: 'Used for fix-and-flips: Maximum offer = (ARV × 70%) - Repair Costs. Ensures adequate profit margin.', example: 'ARV $200K × 70% = $140K - $30K repairs = Max offer $110K.' },
            { term: 'Debt Service Coverage Ratio (DSCR)', category: 'financing', definition: 'NOI divided by annual debt payments. Lenders use this to determine if property cash flow can cover the mortgage. Minimum 1.25 typically required.', example: 'NOI $18K / Mortgage payments $12K = DSCR of 1.5.' },
            { term: 'Hard Money Loan', category: 'financing', definition: 'Short-term, high-interest loans based on property value (not borrower credit). Common for fix-and-flips.', example: 'Borrow $100K at 12% interest for 12 months to renovate and flip a property.' },
            { term: 'Private Money', category: 'financing', definition: 'Loans from individuals (friends, family, investors) rather than institutions. Terms are negotiable.', example: 'Your uncle lends you $50K at 8% interest to buy a rental property.' },
            { term: 'Subject To', category: 'legal', definition: 'Buying a property "subject to" the existing mortgage. The loan stays in the seller\'s name, but you take ownership and make payments.', example: 'Seller owes $80K on mortgage, you buy the house and take over payments without refinancing.' },
            { term: 'Deed of Trust', category: 'legal', definition: 'A legal document used in some states (instead of a mortgage) to secure repayment of a loan with real property as collateral.', example: 'In North Carolina, you sign a deed of trust when getting a mortgage.' },
            { term: 'Title Insurance', category: 'legal', definition: 'Insurance that protects buyers and lenders from financial loss due to defects in a property title (liens, ownership disputes, etc.).', example: 'Title insurance covers you if a previous owner\'s unpaid debt creates a claim on your property.' },
            { term: 'Due Diligence', category: 'legal', definition: 'The period after a contract is signed when the buyer investigates the property (inspections, title search, appraisal) before finalizing the purchase.', example: '10-day due diligence period to inspect property and back out if issues found.' },
            { term: 'Earnest Money', category: 'legal', definition: 'A deposit made by the buyer to show good faith when making an offer. Typically 1-3% of purchase price, held in escrow.', example: 'You offer $100K and put down $2K earnest money. If deal closes, it applies to purchase price.' },
            { term: 'Closing Costs', category: 'financing', definition: 'Fees paid at closing: lender fees, title insurance, appraisal, attorney fees, recording fees. Typically 2-5% of purchase price.', example: 'Buying a $150K property might have $4,500 in closing costs.' },
            { term: 'LTV (Loan-to-Value)', category: 'financing', definition: 'The ratio of the loan amount to the property value. Lenders use this to assess risk. Lower LTV = lower risk.', example: 'Borrow $80K on a $100K property = 80% LTV.' },
            { term: 'PMI (Private Mortgage Insurance)', category: 'financing', definition: 'Insurance required when down payment is less than 20%. Protects the lender if you default.', example: 'You put 10% down, so you pay $100/month PMI until you reach 20% equity.' },
            { term: 'Gross Rent Multiplier (GRM)', category: 'metrics', definition: 'Property price divided by annual gross rental income. Quick way to compare investment properties.', example: 'Property price $200K / Annual rent $24K = GRM of 8.3.' },
            { term: 'CapEx (Capital Expenditures)', category: 'construction', definition: 'Major expenses for long-term assets: roof, HVAC, water heater, foundation. Smart investors budget 5-10% of rent for CapEx reserves.', example: 'Roof replacement costs $8K. Without CapEx reserves, this wipes out your cash flow.' },
            { term: 'IRR (Internal Rate of Return)', category: 'metrics', definition: 'A complex metric that accounts for time value of money, cash flows over time, and exit value. Used in syndications and multi-year investments.', example: 'A property with 8% annual returns and 20% appreciation at exit might have a 12% IRR.' },
            { term: 'CoC Return (Year 1)', category: 'metrics', definition: 'First-year cash-on-cash return. Focuses on immediate cash flow performance.', example: 'You invest $40K and generate $3,200 cash flow in year 1 = 8% CoC return.' },
            { term: 'Appreciation', category: 'valuation', definition: 'The increase in property value over time. Can be natural (market growth) or forced (renovations).', example: 'You buy for $100K, hold 5 years, sell for $130K = $30K appreciation.' },
            { term: 'Cash Flow', category: 'metrics', definition: 'Net income after all expenses (mortgage, taxes, insurance, maintenance, management, vacancy). The money left in your pocket each month.', example: 'Rent $1,500 - All expenses $1,200 = $300/month cash flow.' },
            { term: 'Vacancy Rate', category: 'metrics', definition: 'The percentage of time a property sits empty. Factor 5-8% into your analysis even if you plan to keep it rented.', example: 'Your tenant leaves, takes 1 month to find new one = 8.3% annual vacancy.' },
            { term: 'Turnover Costs', category: 'metrics', definition: 'Expenses when a tenant moves out: cleaning, repairs, marketing, lost rent during vacancy.', example: 'Tenant leaves: $300 cleaning, $500 repairs, $1,200 lost rent = $2,000 turnover cost.' },
            { term: 'Comparative Market Analysis (CMA)', category: 'valuation', definition: 'A report prepared by a real estate agent comparing recently sold properties to estimate a property\'s value.', example: 'Agent pulls 5 recent sales of similar homes to estimate your property is worth $185K.' },
            { term: 'BPO (Broker Price Opinion)', category: 'valuation', definition: 'A less formal valuation than an appraisal, prepared by a real estate broker. Used by lenders, investors, and wholesalers.', example: 'Lender orders a BPO for $150 instead of a $400 appraisal to verify property value.' },
            { term: 'Appraisal', category: 'valuation', definition: 'A professional, unbiased estimate of a property\'s value. Required by most lenders for financing.', example: 'Lender requires a $400 appraisal to confirm the property is worth the loan amount.' },
            { term: 'Desktop Appraisal', category: 'valuation', definition: 'An appraisal conducted without a physical inspection, using data and photos. Faster and cheaper than full appraisals.', example: 'Refinancing during COVID? Lender may accept a $200 desktop appraisal instead of in-person.' },
            { term: 'Rehab Budget', category: 'construction', definition: 'The total estimated cost to repair and renovate a property. Always add 15-20% contingency for surprises.', example: 'Contractor quotes $30K for kitchen, bath, flooring. Budget $35K to be safe.' },
            { term: 'Scope of Work (SOW)', category: 'construction', definition: 'A detailed document listing all repairs and renovations to be completed, with costs and timelines.', example: 'SOW: Paint interior ($2K), replace flooring ($4K), update kitchen ($10K), new HVAC ($5K).' },
            { term: 'Punch List', category: 'construction', definition: 'A final list of small tasks to complete before a project is finished. Used at the end of renovations.', example: 'Punch list: touch up paint, fix cabinet door, replace cracked outlet cover.' },
            { term: 'Draw Schedule', category: 'financing', definition: 'A payment schedule for construction loans. Funds are released in stages as work is completed.', example: 'Lender releases 25% upfront, 25% at framing, 25% at drywall, 25% at completion.' },
            { term: 'Wholesaling', category: 'legal', definition: 'Contracting to buy a property and assigning that contract to another buyer for a fee. You never take ownership.', example: 'You contract a property for $50K, find a buyer at $55K, assign the contract and pocket $5K.' },
            { term: 'Assignment Fee', category: 'legal', definition: 'The fee a wholesaler charges to assign a purchase contract to another buyer.', example: 'Wholesaler finds deal at $60K, assigns to you for $65K, keeps $5K assignment fee.' },
            { term: 'Seller Financing', category: 'financing', definition: 'The seller acts as the lender. You make payments directly to them instead of a bank.', example: 'Seller agrees to $10K down, you pay them $1,000/month at 6% interest over 10 years.' },
            { term: 'Lease Option', category: 'legal', definition: 'A lease with an option to purchase the property at a later date. Combines renting with a future purchase path.', example: 'Rent for 2 years at $1,200/month with option to buy at $150K anytime during lease.' },
            { term: 'Rent-to-Own', category: 'legal', definition: 'Similar to lease option, but a portion of rent goes toward the purchase price.', example: 'Rent $1,500/month, $300 applies toward down payment if you buy within 2 years.' },
            { term: 'Section 8', category: 'legal', definition: 'A government housing assistance program where rent is partially or fully paid by Housing Authority.', example: 'Tenant pays $200, government pays $800 = $1,000 total rent, guaranteed payment.' },
            { term: 'Tenant Screening', category: 'legal', definition: 'The process of verifying a tenant\'s credit, income, rental history, and criminal background before leasing.', example: 'Require 600+ credit score, 3x income-to-rent ratio, no evictions in last 5 years.' },
            { term: 'Eviction', category: 'legal', definition: 'The legal process of removing a tenant for non-payment, lease violations, or other reasons.', example: 'Tenant doesn\'t pay rent for 3 months, you file eviction and regain possession in 6 weeks.' },
            { term: 'Holdover Tenant', category: 'legal', definition: 'A tenant who remains in the property after the lease expires without permission.', example: 'Lease ends June 30, tenant refuses to leave, you file eviction for holdover.' },
            { term: 'Absorption Rate', category: 'valuation', definition: 'The rate at which available properties are sold in a specific market over a time period. Used to gauge market health.', example: 'If 100 homes are on market and 10 sell per month, absorption rate is 10 months.' },
            { term: 'Days on Market (DOM)', category: 'valuation', definition: 'The number of days a property has been listed for sale. Lower DOM often indicates a hot market.', example: 'Property listed 5 days ago already has offers = hot market.' },
            { term: 'Off-Market Deal', category: 'valuation', definition: 'A property for sale that is not publicly listed on MLS. Found through direct marketing, networking, or wholesalers.', example: 'You mail letters to homeowners, one responds and sells directly to you (no agent).' },
            { term: 'MLS (Multiple Listing Service)', category: 'legal', definition: 'A database used by real estate agents to list and share properties for sale. Public sites like Zillow pull from MLS.', example: 'Agent lists your property on MLS, making it visible to all agents and buyers.' },
            { term: 'Earnest Money Deposit (EMD)', category: 'legal', definition: 'See "Earnest Money." The deposit held in escrow to secure your offer.', example: 'You offer $120K with $3K EMD. Seller accepts, $3K is held until closing.' },
            { term: 'Escrow', category: 'legal', definition: 'A neutral third party holds funds or documents during a transaction until conditions are met.', example: 'Your $5K earnest money is held in escrow by title company until closing.' },
            { term: 'Clear to Close', category: 'legal', definition: 'Lender approval indicating all conditions are met and you\'re ready to close on the property.', example: 'Underwriter reviews everything, issues "clear to close," closing scheduled for Friday.' },
            { term: 'Underwriting', category: 'financing', definition: 'The process where a lender evaluates your financials, the property, and the loan to decide if they\'ll approve it.', example: 'Underwriter reviews your income, credit, appraisal, and approves the loan.' },
            { term: 'Pre-Approval', category: 'financing', definition: 'A lender\'s conditional commitment to lend you a specific amount based on preliminary review of your finances.', example: 'You get pre-approved for $200K, giving you confidence to make offers.' },
            { term: 'Pre-Qualification', category: 'financing', definition: 'An informal estimate of how much you might be able to borrow. Less rigorous than pre-approval.', example: 'Lender pre-qualifies you for $180K based on stated income (not verified yet).' },
            { term: 'Amortization', category: 'financing', definition: 'The process of gradually paying off a loan through scheduled payments over time.', example: '30-year mortgage = 360 monthly payments, fully amortized by end.' },
            { term: 'Interest-Only Loan', category: 'financing', definition: 'A loan where you only pay interest for a period, then principal + interest. Lower initial payments.', example: 'First 5 years: pay $500/month interest only. Year 6+: pay $1,200/month principal + interest.' },
            { term: 'Balloon Payment', category: 'financing', definition: 'A large final payment due at the end of a loan term. Common in seller financing or commercial loans.', example: 'You pay $1,000/month for 5 years, then owe $80K balloon payment at end.' },
            { term: 'Points', category: 'financing', definition: 'Fees paid to the lender at closing to reduce the interest rate. 1 point = 1% of loan amount.', example: 'You pay $2,000 (1 point on $200K loan) to lower interest rate from 7% to 6.75%.' },
            { term: 'Origination Fee', category: 'financing', definition: 'A fee charged by the lender to process a new loan application. Typically 0.5-1% of loan amount.', example: 'Lender charges 1% origination fee on $100K loan = $1,000 fee at closing.' },
            { term: 'Rate Lock', category: 'financing', definition: 'An agreement that guarantees your interest rate for a specific period (30-60 days) while your loan is processed.', example: 'You lock in 6.5% rate for 45 days so it doesn\'t increase before closing.' },
            { term: 'Assumable Mortgage', category: 'financing', definition: 'A mortgage that can be transferred from the seller to the buyer. Buyer takes over existing loan terms.', example: 'Seller has 4% mortgage, you assume it instead of getting a new 7% loan.' },
            { term: 'Conventional Loan', category: 'financing', definition: 'A mortgage not insured by the government (FHA, VA, USDA). Typically requires higher credit score and down payment.', example: 'You put 20% down on investment property with conventional loan at 7% interest.' },
            { term: 'FHA Loan', category: 'financing', definition: 'A government-insured loan allowing as little as 3.5% down. Must be owner-occupied.', example: 'First-time buyer puts 3.5% down on $200K house using FHA loan.' },
            { term: 'VA Loan', category: 'financing', definition: 'A government-backed loan for veterans and active military, allowing 0% down and no PMI.', example: 'Veteran buys $300K house with $0 down using VA loan.' },
            { term: 'Portfolio Loan', category: 'financing', definition: 'A loan kept by the lender (not sold to Fannie Mae/Freddie Mac). Allows for more flexible terms.', example: 'Local credit union offers portfolio loan with 10% down for investment property.' },
            { term: 'DSCR Loan', category: 'financing', definition: 'A loan based on the property\'s cash flow, not your personal income. Great for investors with multiple properties.', example: 'Property generates enough income to cover mortgage, no W-2 verification required.' },
            { term: 'Refinance', category: 'financing', definition: 'Replacing your existing mortgage with a new one, often to get better terms or pull out equity.', example: 'You refinance from 7% to 5.5%, lowering monthly payment by $200.' },
            { term: 'Cash-Out Refinance', category: 'financing', definition: 'Refinancing for more than you owe and taking the difference in cash. Used to access equity.', example: 'You owe $100K, refinance for $130K, get $30K cash (minus fees).' },
            { term: 'Rate-and-Term Refinance', category: 'financing', definition: 'Refinancing to change the interest rate or loan term, without taking cash out.', example: 'You refinance from 30-year to 15-year loan to pay off faster.' },
            { term: 'Prepayment Penalty', category: 'financing', definition: 'A fee charged if you pay off your mortgage early. Common in commercial loans.', example: 'You refinance within 3 years, lender charges 2% of loan balance as penalty.' },
            { term: 'Equity', category: 'valuation', definition: 'The difference between what your property is worth and what you owe on it.', example: 'Property worth $200K, you owe $150K = $50K equity.' },
            { term: 'Sweat Equity', category: 'valuation', definition: 'Equity gained by doing work yourself instead of hiring contractors.', example: 'You renovate the property yourself, saving $10K in labor = $10K sweat equity.' },
            { term: 'Forced Appreciation', category: 'valuation', definition: 'Increasing property value through renovations, not market growth.', example: 'You spend $30K on updates, increasing value by $50K = $20K forced appreciation.' },
            { term: 'Market Appreciation', category: 'valuation', definition: 'Property value increase due to market conditions, not improvements.', example: 'You buy in 2020 for $150K, neighborhood values rise, worth $180K in 2023.' },
            { term: 'Depreciation (Tax)', category: 'financing', definition: 'A tax deduction allowing you to write off the cost of the building (not land) over 27.5 years for residential properties.', example: 'Property cost $200K, land $50K, building $150K. Deduct $5,454/year for 27.5 years.' },
            { term: 'Cost Segregation', category: 'financing', definition: 'A tax strategy that accelerates depreciation by reclassifying building components into shorter-lived assets.', example: 'Reclassify flooring, fixtures, landscaping to 5-15 year depreciation instead of 27.5 years.' },
            { term: '1031 Exchange', category: 'legal', definition: 'A tax-deferred exchange allowing you to sell one investment property and buy another without paying capital gains tax.', example: 'Sell rental for $300K, buy new one for $350K, defer taxes on $300K gain.' },
        ];

        // Generate alphabet navigation
        const alphabetNav = document.getElementById('alphabetNav');
        const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
        alphabet.forEach(letter => {
            const link = document.createElement('a');
            link.href = '#' + letter;
            link.className = 'alphabet-link';
            link.textContent = letter;
            alphabetNav.appendChild(link);
        });

        // Render terms
        function renderTerms(terms) {
            const container = document.getElementById('termsContainer');
            const noResults = document.getElementById('noResults');
            
            container.innerHTML = '';
            
            if (terms.length === 0) {
                noResults.style.display = 'block';
                return;
            }
            
            noResults.style.display = 'none';
            
            // Sort terms alphabetically
            terms.sort((a, b) => a.term.localeCompare(b.term));
            
            terms.forEach(item => {
                const card = document.createElement('div');
                card.className = 'term-card';
                card.innerHTML = `
                    <h3 class="term-title" id="${item.term.charAt(0).toUpperCase()}">${item.term}</h3>
                    <span class="term-category">${item.category.toUpperCase()}</span>
                    <p class="term-definition">${item.definition}</p>
                    ${item.example ? `<div class="term-example"><strong>Example:</strong> ${item.example}</div>` : ''}
                `;
                container.appendChild(card);
            });
        }

        // Initial render
        renderTerms(glossaryTerms);

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase();
            const filtered = glossaryTerms.filter(term => 
                term.term.toLowerCase().includes(query) ||
                term.definition.toLowerCase().includes(query)
            );
            renderTerms(filtered);
        });

        // Category filtering
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                const category = this.dataset.category;
                if (category === 'all') {
                    renderTerms(glossaryTerms);
                } else {
                    const filtered = glossaryTerms.filter(term => term.category === category);
                    renderTerms(filtered);
                }
            });
        });
    </script>
</body>
</html>
